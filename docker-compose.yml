services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_PASSWORD:-YourStrong!Passw0rd}" -C -Q "SELECT 1"
      interval: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: Backend/Enquiry.api/Enquiry.api
      dockerfile: Dockerfile
    environment:
      DB_CONNECTION_STRING: "Server=db;Database=EnquiryDb;User Id=sa;Password=${DB_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True"
      JWT_KEY: ${JWT_KEY:-SuperSecretKeyForDevOnly2025!EnquiryPro12345}
      CORS_ALLOWED_ORIGIN: "http://localhost"
    ports:
      - "5135:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: Frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mssql_data:
